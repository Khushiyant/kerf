name: ci

on:
  push:
  pull_request:

jobs:
  check:
    name: fmt + clippy + test (Linux, pinned toolchain)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      # Pinned to match rust-toolchain.toml so CI lints/builds with exactly the dev toolchain.
      - uses: dtolnay/rust-toolchain@1.90.0
        with:
          components: rustfmt, clippy
      - name: fmt
        run: cargo fmt --all --check
      - name: clippy
        run: cargo clippy --workspace --all-targets --all-features -- -D warnings
      - name: test
        run: cargo test --workspace --all-features
      - name: benches compile
        run: cargo bench --workspace --all-features --no-run
      - name: perf regression gate
        # A load-bearing latency property: a single-layer re-denote must stay far cheaper than a full
        # one (the incremental cache). Run in release so the ratio is measured on optimized code.
        run: cargo test -p kerf-core --release --all-features a_single_layer_re_denote_is_far_cheaper_than_a_full_one
      - name: cli smoke test
        run: |
          cargo run -q -p kerf-cli -- verify examples/sample.gcode
          cargo run -q -p kerf-cli -- inspect examples/sample.gcode --json > /dev/null
          cargo run -q -p kerf-cli -- diff examples/sample.gcode examples/sample.gcode

  proofs:
    name: kani bounded proofs
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      # Model-checks the #[cfg(kani)] harnesses in kerf-core (reversal-invariance mechanism, distance
      # non-negativity, parser float→micron safety). See docs/08-semantics.md §5b.
      - uses: model-checking/kani-github-action@v1
        with:
          args: "-p kerf-core"

  lean-proofs:
    name: lean proofs (P1–P5)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      # `lake build` runs the Lean kernel over proofs/KerfProofs.lean; success == the unbounded proofs
      # of P1–P5 check with no `sorry`. See docs/08-semantics.md §5a and proofs/README.md.
      - uses: leanprover/lean-action@v1
        with:
          lake-package-directory: "proofs"

  wheels:
    name: build wheels (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: PyO3/maturin-action@v1
        with:
          command: build
          args: --release --out dist
      - uses: actions/upload-artifact@v4
        with:
          name: wheels-${{ matrix.os }}
          path: dist/*.whl
