name: ci

on:
  push:
  pull_request:

jobs:
  check:
    name: fmt + clippy + test (Linux, pinned toolchain)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      # Pinned to match rust-toolchain.toml so CI lints/builds with exactly the dev toolchain.
      - uses: dtolnay/rust-toolchain@1.90.0
        with:
          components: rustfmt, clippy
      - name: fmt
        run: cargo fmt --all --check
      - name: clippy
        run: cargo clippy --workspace --all-targets --all-features -- -D warnings
      - name: test
        run: cargo test --workspace --all-features
      - name: cli smoke test
        run: |
          cargo run -q -p kerf-cli -- verify examples/sample.gcode
          cargo run -q -p kerf-cli -- inspect examples/sample.gcode --json > /dev/null
          cargo run -q -p kerf-cli -- diff examples/sample.gcode examples/sample.gcode

  wheels:
    name: build wheels (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@1.90.0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: build abi3 wheel
        run: |
          pip install maturin
          maturin build --release
      - uses: actions/upload-artifact@v4
        with:
          name: wheels-${{ matrix.os }}
          path: target/wheels/*.whl
