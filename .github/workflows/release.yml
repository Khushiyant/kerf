name: release

# Cuts a full release when a version tag is pushed (e.g. `git tag v1.0.1 && git push --tags`).
# YOU trigger it by pushing the tag; nothing here runs on ordinary pushes. See RELEASE.md for the
# checklist and the one-time secret / trusted-publisher setup this expects.
on:
  push:
    tags: ["v*.*.*"]
  workflow_dispatch: {} # allow a manual dry run from the Actions tab

permissions:
  contents: write # create the GitHub Release
  id-token: write # PyPI Trusted Publishing (OIDC) — no token stored

jobs:
  # 1. crates.io — publish the library then the CLI, in dependency order. kerf-py is publish=false.
  crates-io:
    name: publish to crates.io
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@1.90.0
      - name: publish kerf-core, then kerf-cli
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: |
          cargo publish -p kerf-core
          # kerf-cli depends on kerf-core by version; wait for the index to catch up, then publish.
          for i in $(seq 1 30); do
            if cargo publish -p kerf-cli; then exit 0; fi
            echo "kerf-core not indexed yet; retrying in 20s ($i/30)"; sleep 20
          done
          echo "::error::kerf-cli publish did not succeed"; exit 1

  # 2. PyPI — build abi3 wheels on all three OSes plus an sdist, as artifacts.
  wheels:
    name: build wheel (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: PyO3/maturin-action@v1
        with:
          command: build
          args: --release --out dist
      - uses: actions/upload-artifact@v4
        with:
          name: dist-${{ matrix.os }}
          path: dist/*.whl

  sdist:
    name: build sdist
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: PyO3/maturin-action@v1
        with:
          command: sdist
          args: --out dist
      - uses: actions/upload-artifact@v4
        with:
          name: dist-sdist
          path: dist/*.tar.gz

  pypi:
    name: publish to PyPI
    needs: [wheels, sdist]
    runs-on: ubuntu-latest
    # Trusted Publishing binds this environment to the PyPI project; configure it once on PyPI.
    environment: pypi
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          pattern: dist-*
          merge-multiple: true
      - uses: pypa/gh-action-pypi-publish@release/v1
        # No token: Trusted Publishing (OIDC) via `id-token: write`. Falls back to a token only if you
        # set one (see RELEASE.md).

  # 3. GitHub Release — attach the built wheels/sdist once crates.io + PyPI succeed.
  github-release:
    name: github release
    needs: [crates-io, pypi]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          path: dist
          pattern: dist-*
          merge-multiple: true
      - uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true
