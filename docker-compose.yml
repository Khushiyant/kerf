# Run the whole Kerf platform locally with a durable Postgres backend:
#   docker compose up --build
# then open http://localhost:8080 and submit G-code with the X-API-Key below.
services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: kerf
      POSTGRES_PASSWORD: kerf
      POSTGRES_DB: kerf
    volumes:
      - kerf-pg:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U kerf -d kerf"]
      interval: 2s
      timeout: 3s
      retries: 30

  kerf:
    build: .
    ports:
      - "${KERF_PORT:-8080}:8080"
    environment:
      KERF_ADDR: 0.0.0.0:8080
      KERF_API_KEY: ${KERF_API_KEY:-dev-key}
      KERF_READER_KEY: ${KERF_READER_KEY:-read-key}
      KERF_TENANT: ${KERF_TENANT:-default}
      DATABASE_URL: postgres://kerf:kerf@postgres:5432/kerf
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

volumes:
  kerf-pg:
